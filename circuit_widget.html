<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Circuit Simulator — Beamer+</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #ffffff;
  --panel:     #f9f9f8;
  --panel-2:   #f3f3f1;
  --border:    #e9e9e6;
  --border-md: #d4d4cf;
  --ink:       #1a1a18;
  --ink-2:     #6b6b65;
  --ink-3:     #aeaea5;
  --grid:      #e9e9e6;
  --high:      #f59e0b;
  --low:       #d1d0cc;
  --low-p:     #6b6b65;
  --shadow:    0 1px 0 rgba(26,26,24,.04), 0 6px 20px -8px rgba(26,26,24,.14);
  --r:         6px;
  --mono:      'JetBrains Mono','Fira Code',ui-monospace,monospace;
  --ui:        'DM Sans',system-ui,-apple-system,sans-serif;
}
*,*::before,*::after { box-sizing: border-box; }
html,body,#root { height:100%; margin:0; }
body { font-family:var(--ui); color:var(--ink); background:var(--bg); overflow:hidden; font-size:13px;
  -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none;
}
input, textarea { -webkit-user-select:text; -moz-user-select:text; -ms-user-select:text; user-select:text; }

.app  { height:100%; display:flex; flex-direction:column; }
.main { flex:1; display:flex; min-height:0; }

/* toolbar */
.tb {
  flex-shrink:0; height:42px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 14px; gap:8px;
}
.tb-title { font-size:13px; font-weight:600; letter-spacing:-.01em; }
.tb-sep { width:1px; height:18px; background:var(--border); flex-shrink:0; }
.tb-hint { font-size:11px; color:var(--ink-3); }
.tb-delay {
  margin-left:auto; display:flex; align-items:center; gap:7px;
  font-size:11.5px; color:var(--ink-2);
}
.tb-delay input[type=range] { width:80px; accent-color:var(--high); cursor:pointer; }
.tb-delay-val { font-family:var(--mono); font-size:11px; color:var(--ink); min-width:46px; }

/* palette */
.palette {
  width:190px; background:var(--panel);
  border-right:1px solid var(--border);
  overflow-y:auto; padding:12px 9px 20px;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.palette::-webkit-scrollbar { width:4px; }
.palette::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.pal-group { margin-top:16px; }
.pal-group:first-child { margin-top:0; }
.pal-group-title {
  font-size:10px; font-weight:600; letter-spacing:.06em; text-transform:uppercase;
  color:var(--ink-3); padding:0 2px 7px;
}
.pal-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.pal-item {
  background:var(--bg); border:1px solid var(--border); border-radius:var(--r);
  padding:7px 3px 5px;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  cursor:grab; font:inherit; color:inherit;
  transition:background .1s, border-color .1s, transform .1s, box-shadow .1s;
}
.pal-item:hover { background:var(--panel-2); border-color:var(--border-md); transform:translateY(-1px); box-shadow:0 3px 8px rgba(26,26,24,.07); }
.pal-item:active { cursor:grabbing; transform:none; box-shadow:none; }
.pal-label { font-size:10px; font-family:var(--mono); color:var(--ink-2); }

/* canvas */
.canvas-wrap { flex:1; position:relative; min-width:0; }
.canvas      { display:block; }

/* floating counter */
.fc {
  position:absolute; top:12px; left:12px; pointer-events:none;
  display:flex; align-items:center; gap:6px;
  background:var(--bg); border:1px solid var(--border);
  border-radius:999px; padding:4px 11px;
  font-size:11.5px; color:var(--ink-2); box-shadow:var(--shadow);
}
.fc-n   { font-family:var(--mono); font-weight:500; color:var(--ink); }
.fc-lbl { font-size:11px; color:var(--ink-3); }
.fc-div { width:1px; height:11px; background:var(--border); }

/* clock overlay */
.clk-panel {
  position:absolute; z-index:20; pointer-events:all;
  background:var(--bg); border:1px solid var(--border);
  border-radius:8px; padding:10px 12px 8px;
  box-shadow:var(--shadow);
  font-size:11.5px; min-width:148px;
  transform:translateX(-50%);
}
.clk-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
.clk-label  { font-weight:600; font-size:12px; }
.clk-status { font-family:var(--mono); font-size:10.5px; color:var(--ink-2); }
.clk-period { display:flex; align-items:center; gap:6px; }
.clk-period input[type=range] { flex:1; accent-color:var(--high); }
.clk-period-val { font-family:var(--mono); font-size:11px; color:var(--ink-2); min-width:42px; text-align:right; }

/* modal */
.modal-bg { position:fixed; inset:0; background:rgba(26,26,24,.28); display:grid; place-items:center; z-index:100; }
.modal { background:var(--bg); border-radius:10px; padding:20px; width:400px; max-width:calc(100vw - 32px); box-shadow:var(--shadow); border:1px solid var(--border); }
.modal-title { font-size:14px; font-weight:600; margin-bottom:12px; }
.text-input { width:100%; padding:8px 10px; border-radius:var(--r); border:1px solid var(--border); font:inherit; font-size:13px; background:var(--bg); color:var(--ink); outline:none; }
.text-input:focus { border-color:var(--border-md); box-shadow:0 0 0 3px rgba(26,26,24,.06); }
.dialog-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:14px; }
.btn { font-family:var(--ui); font-size:12.5px; font-weight:500; height:28px; padding:0 12px; border-radius:var(--r); border:1px solid var(--border); cursor:pointer; transition:background .1s; display:inline-flex; align-items:center; }
.btn:disabled { opacity:.35; cursor:not-allowed; }
.btn.ghost   { background:var(--bg); color:var(--ink); }
.btn.ghost:hover:not(:disabled) { background:var(--panel); border-color:var(--border-md); }
.btn.ghost.danger { color:#dc2626; }
.btn.ghost.danger:hover:not(:disabled) { background:#fef2f2; border-color:#fecaca; }
.btn.primary { background:var(--ink); color:#fff; border-color:var(--ink); }
.btn.primary:hover:not(:disabled) { background:#2d2d2a; }
.empty { color:var(--ink-2); padding:16px 0; text-align:center; font-size:12.5px; }
.saved-list { display:flex; flex-direction:column; gap:6px; max-height:320px; overflow-y:auto; margin-top:4px; }
.saved-item { display:flex; justify-content:space-between; align-items:center; padding:9px 10px; background:var(--panel); border-radius:var(--r); border:1px solid var(--border); }
.saved-name { font-weight:600; font-size:13px; }
.saved-meta { font-size:11px; color:var(--ink-2); font-family:var(--mono); margin-top:2px; }

/* properties overlay */
.prop-panel { 
  position:fixed; right: 10px; bottom: 10px; width:200px;
  background:var(--bg); border: 1px solid var(--border); 
  border-radius: 8px; padding: 10px 12px 8px;
  box-shadow: var(--shadow); z-index: 20;
  font-size:11.5px; min-width:148px;
}
.prop-title { font-weight: 600; font-size: 14px; margin-bottom: 7px;}
.prop-option  { display: flex; justify-content: space-between; align-items: center; margin-top: 7px;}
.prop-label { font-weight: 600; font-size: 12px; margin-right: 7px;}
.prop-input { width:100%; padding:8px 10px; border-radius:var(--r); border:1px solid var(--border); font:inherit; font-size:12px; background:var(--bg); color:var(--ink); outline:none; }

</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<script src="quine_mccluskey.js"></script>

<script type="text/babel">
/* ═══ ENGINE ═══════════════════════════════════════════════════════════════ */
(function () {
  'use strict';

  const GATE_DEFS = {
    INPUT:  { kind:'INPUT',  label:'IN',    inputs:0, outputs:1, family:'io',
              compute:(i,s) => [s.value?1:0] },
    OUTPUT: { kind:'OUTPUT', label:'OUT',   inputs:1, outputs:0, family:'io',
              compute:()=>[] },
    CLOCK:  { kind:'CLOCK',  label:'CLK',   inputs:0, outputs:1, family:'io',
              compute:(i,s) => [s.value?1:0] },
    AND:    { kind:'AND',  label:'AND',   inputs:2, outputs:1, family:'and',  compute:([a,b])=>[(a&b)&1] },
    OR:     { kind:'OR',   label:'OR',    inputs:2, outputs:1, family:'or',   compute:([a,b])=>[(a|b)&1] },
    NOT:    { kind:'NOT',  label:'NOT',   inputs:1, outputs:1, family:'not',  compute:([a])=>[a?0:1] },
    NAND:   { kind:'NAND', label:'NAND',  inputs:2, outputs:1, family:'and',  compute:([a,b])=>[(a&b)?0:1] },
    NOR:    { kind:'NOR',  label:'NOR',   inputs:2, outputs:1, family:'or',   compute:([a,b])=>[(a|b)?0:1] },
    XOR:    { kind:'XOR',  label:'XOR',   inputs:2, outputs:1, family:'xor',  compute:([a,b])=>[(a^b)&1] },
    XNOR:   { kind:'XNOR', label:'XNOR',  inputs:2, outputs:1, family:'xor',  compute:([a,b])=>[(a^b)?0:1] },
    MUX:    { kind:'MUX',  label:'MUX',   inputs:3, outputs:1, family:'mux',  compute:([a,b,c])=>[c?b:a] },
    DFF:    { kind:'DFF',  label:'D-FF',  inputs:2, outputs:1, family:'seq',
              compute:([d,clk],s)=>{ const r=clk&&!s.lastClk; s.lastClk=clk; if(r)s.q=d?1:0; return[s.q||0]; } },
    TFF:    { kind:'TFF',  label:'T-FF',  inputs:2, outputs:1, family:'seq',
              compute:([t,clk],s)=>{ const r=clk&&!s.lastClk; s.lastClk=clk; if(r&&t)s.q=s.q?0:1; return[s.q||0]; } },
    JKFF:   { kind:'JKFF', label:'JK-FF', inputs:3, outputs:1, family:'seq',
              compute:([j,k,clk],s)=>{ const r=clk&&!s.lastClk; s.lastClk=clk; if(r){if(j&&k)s.q=s.q?0:1; else if(j)s.q=1; else if(k)s.q=0;} return[s.q||0]; } },
    SRFF:   { kind:'SRFF', label:'SR-FF', inputs:2, outputs:1, family:'seq',
              compute:([s2,r],s)=>{ if(s2&&!r)s.q=1; else if(r&&!s2)s.q=0; return[s.q||0]; } },
  };

  // ── Pure wire geometry helpers ──────────────────────────────────────────
  // Lives here (not in the CANVAS section) because ENGINE's step()/
  // wireSourceValue() needs these for delay propagation, and CANVAS also
  // needs them for rendering. Keeping them in ENGINE and exposing them on
  // `window` for CANVAS to consume avoids a circular dependency where
  // ENGINE used to reach into CANVAS's exports for its own simulation math.

  function projectOrthogonalPoint(a,b,x,y) {
    if (a.x===b.x) return {x:a.x,y:Math.max(Math.min(y,Math.max(a.y,b.y)),Math.min(a.y,b.y))};
    if (a.y===b.y) return {x:Math.max(Math.min(x,Math.max(a.x,b.x)),Math.min(a.x,b.x)),y:a.y};
    return {x:a.x,y:a.y};
  }

  function terminalCoords(term, circuit) {
    if (!term) return {x:0,y:0};
    if (typeof term.compId==='string') {
      const comp = circuit.components.get(term.compId);
      if (!comp) return {x:term.x||0,y:term.y||0};
      const vis = window.GATE_VIS[comp.kind];
      const kind = term.type || (typeof term.pin==='number' && term.pin < (vis.inputs.length||0) ? 'in' : 'out');
      return window.pinAbs(comp, kind, term.pin);
    }
    return {x:term.x||0,y:term.y||0};
  }

  function wireKnots(x1,y1,x2,y2,pts=[]) {
    return [{x:x1,y:y1},...pts,{x:x2,y:y2}];
  }

  function resolveWire(x1,y1,x2,y2,pts=[]) {
    const knots=wireKnots(x1,y1,x2,y2,pts);
    const out=[knots[0]];
    for (let i=1;i<knots.length;i++) {
      const a=out[out.length-1], b=knots[i];
      if (a.x===b.x || a.y===b.y) {
        out.push(b);
      } else {
        out.push({x:b.x,y:a.y}, b);
      }
    }
    return out;
  }

  function wirePath(x1,y1,x2,y2,pts=[]) {
    const p=resolveWire(x1,y1,x2,y2,pts);
    return p.map((v,i)=>(i?'L ':'M ')+v.x+' '+v.y).join('');
  }

  function sampleWire(x1,y1,x2,y2,pts=[],t) {
    const p=resolveWire(x1,y1,x2,y2,pts);
    let total=0; const lens=[];
    for (let i=1;i<p.length;i++){const dx=p[i].x-p[i-1].x,dy=p[i].y-p[i-1].y,l=Math.hypot(dx,dy);lens.push(l);total+=l;}
    let d=t*total;
    for (let i=0;i<lens.length;i++){
      if(d<=lens[i]||i===lens.length-1){const f=lens[i]>0?Math.min(1,d/lens[i]):0;return[p[i].x+(p[i+1].x-p[i].x)*f,p[i].y+(p[i+1].y-p[i].y)*f];}
      d-=lens[i];
    }
    return [p[p.length-1].x,p[p.length-1].y];
  }

  function distToSeg(px,py,ax,ay,bx,by){
    const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
    if(l2===0) return Math.hypot(px-ax,py-ay);
    const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l2));
    return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
  }

  function wireSegmentPoints(wire, circuit) {
    const from = terminalCoords(wire.from, circuit);
    const to = terminalCoords(wire.to, circuit);
    return wireKnots(from.x,from.y,to.x,to.y,wire.points||[]);
  }

  function findNearestWirePoint(wire,x,y,circuit) {
    const knots = wireSegmentPoints(wire, circuit);
    let best = {d:Infinity, point:null, index:0};
    for (let i=0;i<knots.length-1;i++) {
      const a=knots[i], b=knots[i+1];
      const proj = projectOrthogonalPoint(a,b,x,y);
      const d = Math.hypot(proj.x-x,proj.y-y);
      if (d < best.d) best = {d, point:proj, index:i};
    }
    return best;
  }

  function insertBranchPoint(wire, x, y, circuit) {
    const nearest = findNearestWirePoint(wire, x, y, circuit);
    if (!nearest.point) return null;
    const pt = nearest.point;
    const pts = wire.points || [];
    const idx = Math.max(0, nearest.index);
    const newPts = [...pts];
    newPts.splice(idx, 0, {x: pt.x, y: pt.y});
    wire.points = newPts;
    // Register this as an explicit junction so wireSourceValue
    // can find it without geometry scanning, and won't confuse
    // visual crossings with real connections.
    circuit.junctions.add({x: pt.x, y: pt.y, sourceWireId: wire.id});
    return pt;
  }

  function routeManhattanPoints(from, to, firstDir) {
    if (from.x === to.x || from.y === to.y) return [];
    const corner = firstDir === 'v' ? {x:from.x, y:to.y} : {x:to.x, y:from.y};
    return [corner];
  }

  function pinAbs(comp,kind,idx){
    const vis=window.GATE_VIS[comp.kind],p=kind==='in'?vis.inputs[idx]:vis.outputs[idx];
    const cx=vis.w/2, cy=vis.h/2;
    if (comp.facing==='left') {
      // Mirror horizontally: flip x around centre
      return{x:comp.x+(vis.w-p.x), y:comp.y+p.y};
    }
    const angle = comp.facing==='up' ? -90 : comp.facing==='down' ? 90 : 0;
    const rad = angle * Math.PI / 180;
    const dx=p.x-cx, dy=p.y-cy;
    const rx = dx*Math.cos(rad) - dy*Math.sin(rad);
    const ry = dx*Math.sin(rad) + dy*Math.cos(rad);
    return{x:comp.x+cx+rx, y:comp.y+cy+ry};
  }

  function createCircuit() {
    let nextId = 1;
    let nextIoId = 1;
    const components = new Map();
    const ioComponents = new Map();
    const wires = new Map();
    const junctions = new Set(); // {x, y, sourceWireId}

    function addComponent(kind, x, y, label = "none") {
      const def = GATE_DEFS[kind];
      const id = 'c'+(nextId++);
      const ioId = kind==='INPUT' || kind==='OUTPUT' ? 'io'+(nextIoId++) : '' 
      const comp = {
        id, ioId, kind, x, y,
        state: kind==='INPUT' ? {value:0}
            : kind==='CLOCK' ? {value:0, period:1000, lastTick:0, paused:false}
            : kind==='DFF'   ? {q:0, lastClk:0} : {},
        inputVals:  new Array(def.inputs).fill(0),
        outputVals: new Array(def.outputs).fill(0),
        label: label == "none" ? String.fromCharCode(Number(ioId.slice(2)) + 64) : label,
        lastChange: 0,
        facing: "right",
      };
      components.set(id, comp);
      if (ioId != '') {
        ioComponents.set(ioId, comp);
      }
      return comp;
    }

    function removeComponent(id) {
      
      const component = components.get(id);
      components.delete(id);

      if (component.ioId != ''){
        ioComponents.delete(component.ioId);
      }
      for (const [wid,w] of wires) { if (w.from.compId===id||w.to.compId===id) wires.delete(wid); }
    }

    function isWireTerminal(target) {
      return target && typeof target.compId==='string' && typeof target.pin==='number';
    }

    function addWire(from, to) {
      if (isWireTerminal(from) && isWireTerminal(to)) {
        for (const w of wires.values()) {
          if (w.from.compId===from.compId && w.from.pin===from.pin &&
              w.to.compId===to.compId && w.to.pin===to.pin) return null;
        }
      }
      if (isWireTerminal(from) && !from.type) from.type='out';
      if (isWireTerminal(to) && !to.type)   to.type='in';
      const id = 'w'+(nextId++);
      const wire = {id, from, to, value:0, lastChange:0, points:[]};
      wires.set(id, wire);
      return wire;
    }

    function removeWire(id) { 
      wires.delete(id); 
      for (const j of junctions) {
        if (j.sourceWireId === id) junctions.delete(j);
      }
    }

    function wireSourceValue(wire, circuit, wireValues) {
      if (isWireTerminal(wire.from)) {
        const src = circuit.components.get(wire.from.compId);
        if (!src) return 0;
        return src.outputVals[wire.from.pin]||0;
      }
      if (typeof wire.from.x === 'number' && typeof wire.from.y === 'number') {
        const px = wire.from.x, py = wire.from.y;
        // Look up the explicit junction registry instead of scanning geometry
        for (const j of circuit.junctions) {
          if (Math.abs(j.x - px) < 1e-6 && Math.abs(j.y - py) < 1e-6) {
            const src = circuit.wires.get(j.sourceWireId);
            if (!src) continue;

            if (typeof src.pendingValue !== 'undefined') {
              // Find how far along the source wire the junction sits (0..1)
              const knots = wireSegmentPoints(src, circuit);
              let totalLen = 0;
              const lens = [];
              for (let i = 0; i < knots.length - 1; i++) {
                const l = Math.hypot(knots[i+1].x - knots[i].x, knots[i+1].y - knots[i].y);
                lens.push(l); totalLen += l;
              }
              let distToJunction = 0;
              for (let i = 0; i < knots.length - 1; i++) {
                const a = knots[i], b = knots[i+1];
                const onSeg =
                  (Math.abs(a.x - b.x) < 1e-6 && Math.abs(j.x - a.x) < 1e-6 && j.y >= Math.min(a.y,b.y)-1e-6 && j.y <= Math.max(a.y,b.y)+1e-6) ||
                  (Math.abs(a.y - b.y) < 1e-6 && Math.abs(j.y - a.y) < 1e-6 && j.x >= Math.min(a.x,b.x)-1e-6 && j.x <= Math.max(a.x,b.x)+1e-6);
                if (onSeg) {
                  distToJunction += Math.hypot(j.x - a.x, j.y - a.y);
                  break;
                }
                distToJunction += lens[i];
              }

              const t = totalLen > 0 ? distToJunction / totalLen : 0;
              // The signal reaches the junction at pendingStart + t * delayMs
              const REF_LEN = 80;
              const srcKnots = wireSegmentPoints(src, circuit);
              let srcTotalLen = 0;
              for (let i = 0; i < srcKnots.length - 1; i++) {
                srcTotalLen += Math.hypot(srcKnots[i+1].x - srcKnots[i].x, srcKnots[i+1].y - srcKnots[i].y);
              }
              const srcWireDelay = (srcTotalLen / REF_LEN) * (window.__widgetState.delayMs);
              const arrivalTime = (src.pendingStart || 0) + t * srcWireDelay;
              const now = performance.now();

              if (now >= arrivalTime) {
                return src.pendingValue || 0;
              } else {
                // Signal hasn't reached the junction yet
                return src.value || 0;
              }
            }

            return src.value || 0;
          }
        }
        return 0;
      }
      return 0;
    }

    function step(now, delayMs) {
      // Tick clocks
      for (const c of components.values()) {
        if (c.kind==='CLOCK' && !c.state.paused) {
          if (now - c.state.lastTick >= c.state.period/2) {
            c.state.value = c.state.value ? 0 : 1;
            c.state.lastTick = now;
          }
        }
      }
      // Compute outputs
      for (const c of components.values()) {
        const def = GATE_DEFS[c.kind];
        const outs = def.compute(c.inputVals, c.state)||[];
        for (let i=0;i<outs.length;i++) { if(c.outputVals[i]!==outs[i]){c.outputVals[i]=outs[i];c.lastChange=now;} }
      }
      const wireValues = new Map([...wires.values()].map(w=>[w.id,w.value]));
      // Propagate with delay
      for (const w of wires.values()) {
        const srcVal = wireSourceValue(w, {components, wires, ioComponents, junctions}, wireValues);
        if (srcVal!==w.pendingValue && srcVal!==w.value) { w.pendingValue=srcVal; w.pendingStart=now; }
      }
      for (const w of wires.values()) {
        const knots = wireSegmentPoints(w, {components, wires, ioComponents});
        let wireLen = 0;
        for (let i = 0; i < knots.length - 1; i++) {
          wireLen += Math.hypot(knots[i+1].x - knots[i].x, knots[i+1].y - knots[i].y);
        }
        const REF_LEN = 80; // roughly one gate width — signals travel at delayMs per REF_LEN pixels
        const wireDelay = (wireLen / REF_LEN) * delayMs;

        if (typeof w.pendingValue !== 'undefined' && now - (w.pendingStart || 0) >= wireDelay) {
          if(w.value!==w.pendingValue){w.value=w.pendingValue;w.lastChange=now;}
          w.pendingValue=undefined; w.pendingStart=undefined;
        }
        // Do not assign directly to component inputs here — inputs are
        // recomputed after propagation to avoid transient partial updates
        // that can cause a one-frame flicker when wires are reattached.
      }
      // Reset inputs from wires
      const acc = new Map();
      for (const c of components.values()) acc.set(c.id, new Array(GATE_DEFS[c.kind].inputs).fill(0));
      for (const w of wires.values()) {
        if (!isWireTerminal(w.to)) continue;
        const a = acc.get(w.to.compId);
        if (a) {
          // If multiple wires drive the same input, combine drivers with OR
          // so a high on any wire keeps the input high instead of last-writer-wins.
          a[w.to.pin] = (a[w.to.pin] || 0) || (w.value||0);
        }
      }
      for (const c of components.values()) c.inputVals=acc.get(c.id);
    }

    function serialize() {
      return {
        components: [...components.values()].map(c=>({id:c.id,ioId:c.ioId,kind:c.kind,x:c.x,y:c.y,
          state:c.kind==='INPUT'?{value:c.state.value}:c.kind==='CLOCK'?{period:c.state.period,paused:c.state.paused}:{}})),
        wires: [...wires.values()].map(w=>({id:w.id,from:w.from,to:w.to,points:w.points||[]})),
        junctions: [...junctions],
        nextId, nextIoId,
      };
    }

    function load(data) {
      components.clear(); ioComponents.clear(); wires.clear(); junctions.clear(); if(!data) return;
      for (const cd of data.components||[]) {
        const c=addComponent(cd.kind,cd.x,cd.y); components.delete(c.id); ioComponents.delete(c.ioId); c.id=cd.id; c.ioId=cd.ioId;
        if(cd.state) Object.assign(c.state,cd.state); components.set(c.id,c); ioComponents.set(c.ioId, c);
      }
      for (const wd of data.wires||[]) {
        const w=addWire(wd.from,wd.to); if(w){wires.delete(w.id);w.id=wd.id;w.points=wd.points||[];wires.set(w.id,w);}
      }
      for (const j of data.junctions||[]) {
        junctions.add(j);
      }
      nextId=Math.max(data.nextId||1,nextId);
      nextIoId=Math.max(data.nextIoId||1,nextIoId);
    }

    return {
      components, wires, ioComponents, junctions,
      addComponent, removeComponent, addWire, removeWire, step, serialize, load,
      toggleInput(id){const c=components.get(id);if(c&&c.kind==='INPUT')c.state.value=c.state.value?0:1;},
      toggleClock(id){const c=components.get(id);if(c&&c.kind==='CLOCK'){c.state.paused=!c.state.paused;if(!c.state.paused)c.state.lastTick=performance.now();}},
      setClockPeriod(id,p){const c=components.get(id);if(c&&c.kind==='CLOCK')c.state.period=p;},
      setIOLabel(id,l){const c=components.get(id);c.label=l;},
      setFacing(id,f){const c=components.get(id);c.facing=f;},
    };
  }

  // Central cross-section state. Anything CANVAS/APP need to read that
  // originates outside their own scope lives here, instead of being
  // scattered across individual window.__foo globals.
  window.__widgetState = { delayMs: 600, particleDensity: 4, circuit: null };

  window.GATE_DEFS = GATE_DEFS;
  window.createCircuit = createCircuit;

  // Pure geometry helpers, shared with CANVAS section.
  window.projectOrthogonalPoint = projectOrthogonalPoint;
  window.terminalCoords = terminalCoords;
  window.wireKnots = wireKnots;
  window.resolveWire = resolveWire;
  window.wirePath = wirePath;
  window.sampleWire = sampleWire;
  window.distToSeg = distToSeg;
  window.wireSegmentPoints = wireSegmentPoints;
  window.findNearestWirePoint = findNearestWirePoint;
  window.insertBranchPoint = insertBranchPoint;
  window.routeManhattanPoints = routeManhattanPoints;
  window.pinAbs = pinAbs;
})();

/* ═══ CANVAS ═══════════════════════════════════════════════════════════════ */
(function () {
'use strict';
const { useState, useEffect, useRef, useCallback } = React;
const { GATE_VIS, GATE_DEFS, GateBody } = window;
// Pure geometry helpers now live in the ENGINE section (see comment there)
// and are consumed here via window.* to avoid a circular dependency.
const {
  projectOrthogonalPoint, terminalCoords, wireKnots, resolveWire, wirePath,
  sampleWire, distToSeg, wireSegmentPoints, findNearestWirePoint,
  insertBranchPoint, routeManhattanPoints, pinAbs,
} = window;

const GRID = 20;
const snap = (v, on=true) => on ? Math.round(v/GRID)*GRID : v;

function Canvas({ circuit, onSelect, selectedId, paletteDrag, onClearPaletteDrag, onComponentChanged, snapGrid=true }) {
  const svgRef = useRef(null);
  const [view, setView] = useState({x:0,y:0,zoom:1});
  const [wiringFrom, setWiringFrom] = useState(null);
  const [mousePos, setMousePos] = useState({x:0,y:0});
  const [isPanning, setIsPanning] = useState(false);

  // Drag state in refs to avoid stale closures
  const panRef         = useRef(null); // {sx,sy,vx,vy}
  const compDragRef    = useRef(null); // {id,ox,oy,startSX,startSY,moved}
  const wpDragRef      = useRef(null); // {wireId,idx,ox,oy}
  const endpointDragRef= useRef(null); // {wireId,side,ox,oy}

  // Stable refs for values needed in effects
  const viewRef          = useRef(view);
  const paletteDragRef   = useRef(paletteDrag);
  const snapGridRef      = useRef(snapGrid);
  const onChangedRef     = useRef(onComponentChanged);
  const onClearPalRef    = useRef(onClearPaletteDrag);
  const onSelectRef      = useRef(onSelect);
  const wiringFromRef    = useRef(wiringFrom);
  useEffect(()=>{viewRef.current=view;},[view]);
  useEffect(()=>{paletteDragRef.current=paletteDrag;},[paletteDrag]);
  useEffect(()=>{snapGridRef.current=snapGrid;},[snapGrid]);
  useEffect(()=>{onChangedRef.current=onComponentChanged;},[onComponentChanged]);
  useEffect(()=>{onClearPalRef.current=onClearPaletteDrag;},[onClearPaletteDrag]);
  useEffect(()=>{onSelectRef.current=onSelect;},[onSelect]);
  useEffect(()=>{wiringFromRef.current=wiringFrom;},[wiringFrom]);

  // Re-render every frame for live simulation display
  const [, tick] = useState(0);
  useEffect(()=>{let r; const l=()=>{tick(n=>n+1);r=requestAnimationFrame(l);}; r=requestAnimationFrame(l); return()=>cancelAnimationFrame(r);},[]);

  const screenToWorld = useCallback((sx,sy)=>{
    const r=svgRef.current.getBoundingClientRect(),v=viewRef.current;
    return{x:(sx-r.left)/v.zoom-v.x, y:(sy-r.top)/v.zoom-v.y};
  },[]);

  // Global mouse move / up
  useEffect(()=>{
    const onMove=(e)=>{
      const w=screenToWorld(e.clientX,e.clientY);
      setMousePos(w);
      if (wiringFromRef.current && !wiringFromRef.current.dir) {
        const wf=wiringFromRef.current;
        const dx=w.x-wf.startX, dy=w.y-wf.startY;
        if (Math.hypot(dx,dy)>6) {
          const dir=Math.abs(dx)>Math.abs(dy)?'h':'v';
          setWiringFrom(prev=>prev?{...prev,dir}:prev);
        }
      }
      if (panRef.current) {
        const p=panRef.current;
        setView(v=>({...v, x:p.vx+(e.clientX-p.sx)/v.zoom, y:p.vy+(e.clientY-p.sy)/v.zoom}));
      }
      if (compDragRef.current) {
        const d=compDragRef.current;
        if (Math.hypot(e.clientX-d.startSX,e.clientY-d.startSY)>4) {
          d.moved=true;
          const c=circuit.components.get(d.id);
          if(c){c.x=snap(w.x-d.ox,snapGridRef.current);c.y=snap(w.y-d.oy,snapGridRef.current);onChangedRef.current?.();}
        }
      }
      if (wpDragRef.current) {
        const d=wpDragRef.current, wire=circuit.wires.get(d.wireId);
        if(wire?.points?.[d.idx]){
          wire.points[d.idx].x=snap(w.x+d.ox,snapGridRef.current);
          wire.points[d.idx].y=snap(w.y+d.oy,snapGridRef.current);
          onChangedRef.current?.();
        }
      }
      if (endpointDragRef.current) {
        const d=endpointDragRef.current, wire=circuit.wires.get(d.wireId);
        if (wire) {
          const coord={x:snap(w.x+d.ox,snapGridRef.current),y:snap(w.y+d.oy,snapGridRef.current)};
          wire[d.side]=coord;
          onChangedRef.current?.();
        }
      }
    };

    const onUp=(e)=>{
      const w=screenToWorld(e.clientX,e.clientY);
      if (wiringFromRef.current) {
        const wf=wiringFromRef.current;
        if (wf.handled) {
          wiringFromRef.current=null;
          setWiringFrom(null);
        } else {
          const dist = wf.startSX!=null && wf.startSY!=null
            ? Math.hypot(wf.startSX - e.clientX, wf.startSY - e.clientY)
            : Math.hypot(wf.startX - w.x, wf.startY - w.y);
          if (wf.type==='branch' && dist>6) {
            const wire=circuit.wires.get(wf.wireId);
            if (wire) {
              const branchPoint = insertBranchPoint(wire,wf.x,wf.y,circuit);
              const target={x:snap(w.x,snapGridRef.current),y:snap(w.y,snapGridRef.current)};
              const branch = branchPoint ? circuit.addWire({x:branchPoint.x,y:branchPoint.y},target) : null;
              if(branch) branch.points = routeManhattanPoints(terminalCoords(branch.from,circuit), terminalCoords(branch.to,circuit), wf.dir||'h');
              onChangedRef.current?.();
            }
          } else if (wf.type==='pin' && dist>6) {
            const target={x:snap(w.x,snapGridRef.current),y:snap(w.y,snapGridRef.current)};
            const wire=circuit.addWire({compId:wf.compId,pin:wf.pin,type:'out'},target);
            if(wire) wire.points=routeManhattanPoints(terminalCoords(wire.from,circuit),terminalCoords(wire.to,circuit),wf.dir||'h');
            onChangedRef.current?.();
          }
          wiringFromRef.current=null;
          setWiringFrom(null);
        }
      }
      // Drop from palette
      if (paletteDragRef.current) {
        const pd=paletteDragRef.current;
        const vis=GATE_VIS[pd.kind];
        circuit.addComponent(pd.kind,snap(w.x-vis.w/2,snapGridRef.current),snap(w.y-vis.h/2,snapGridRef.current));
        onChangedRef.current?.(); onClearPalRef.current?.();
      }
      // Component drag end — maybe it was a click
      if (compDragRef.current) {
        const d=compDragRef.current;
        if (!d.moved) {
          const comp=circuit.components.get(d.id);
          if (comp?.kind==='INPUT') { circuit.toggleInput(comp.id); onChangedRef.current?.(); }
          if (comp?.kind==='CLOCK')  { circuit.toggleClock(comp.id);  onChangedRef.current?.(); }
        }
        compDragRef.current=null;
      }
      panRef.current=null; wpDragRef.current=null; endpointDragRef.current=null;
      setIsPanning(false);
    };

    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
    return()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
  },[circuit, screenToWorld]);

  // Scroll to zoom
  const onWheel=(e)=>{
    e.preventDefault();
    const r=svgRef.current.getBoundingClientRect(),v=viewRef.current;
    const cx=(e.clientX-r.left)/v.zoom-v.x, cy=(e.clientY-r.top)/v.zoom-v.y;
    const nz=Math.max(.3,Math.min(2.5,v.zoom*Math.exp(-e.deltaY*.0015)));
    setView(()=>({x:(e.clientX-r.left)/nz-cx, y:(e.clientY-r.top)/nz-cy, zoom:nz}));
  };

  const onMouseDownBg=(e)=>{
    if(e.button!==0&&e.button!==1)return;
    if(e.target!==svgRef.current&&!e.target.classList?.contains('canvas-bg'))return;
    panRef.current={sx:e.clientX,sy:e.clientY,vx:view.x,vy:view.y};
    wiringFromRef.current=null;
    setIsPanning(true); setWiringFrom(null); onSelect(null);
  };

  const onCompMouseDown=(e,comp)=>{
    e.stopPropagation(); if(e.button===2)return;
    const w=screenToWorld(e.clientX,e.clientY);
    compDragRef.current={id:comp.id,ox:w.x-comp.x,oy:w.y-comp.y,startSX:e.clientX,startSY:e.clientY,moved:false};
    onSelect(comp.id);
  };
  const onCompContext=(e,comp)=>{e.preventDefault();circuit.removeComponent(comp.id);onComponentChanged?.();};
  const onWireContext=(e,wireId)=>{e.preventDefault();e.stopPropagation();circuit.removeWire(wireId);onComponentChanged?.();};

  const onOutputPinDown=(e,comp,idx)=>{
    e.stopPropagation();
    const p=pinAbs(comp,'out',idx);
    const wf={type:'pin',compId:comp.id,pin:idx,x:p.x,y:p.y,startX:p.x,startY:p.y,startSX:e.clientX,startSY:e.clientY};
    wiringFromRef.current=wf;
    setWiringFrom(wf);
  };
  const onInputPinUp=(e,comp,idx)=>{
    e.stopPropagation();
    const wf = wiringFromRef.current;
    if (!wf) return;
    if (wf.type==='branch') {
      const wire=circuit.wires.get(wf.wireId);
      if (wire) {
        const branchPoint = insertBranchPoint(wire,wf.x,wf.y,circuit);
        const branch = branchPoint ? circuit.addWire({x:branchPoint.x,y:branchPoint.y}, {compId:comp.id,pin:idx,type:'in'}) : null;
        if (branch) branch.points=routeManhattanPoints(terminalCoords(branch.from,circuit),terminalCoords(branch.to,circuit),wf.dir||'h');
        wiringFromRef.current=null;
        onComponentChanged?.(); setWiringFrom(null); return;
      }
    }
    if (wf.type==='endpoint' && wf.side==='to') {
      const wire=circuit.wires.get(wf.wireId);
      if (wire) {
        wire.to={compId:comp.id,pin:idx,type:'in'};
        wire.points = routeManhattanPoints(terminalCoords(wire.from,circuit), terminalCoords(wire.to,circuit), wf.dir||'h');
        endpointDragRef.current=null;
        wiringFromRef.current={...wf, handled:true};
        onComponentChanged?.(); setWiringFrom(null); return;
      }
    }
    if (wf.type==='endpoint' && wf.side==='from') {
      const wire=circuit.wires.get(wf.wireId);
      if (wire) {
        wire.from={compId:comp.id,pin:idx,type:'out'};
        wire.points = routeManhattanPoints(terminalCoords(wire.from,circuit), terminalCoords(wire.to,circuit), wf.dir||'h');
        endpointDragRef.current=null;
        wiringFromRef.current={...wf, handled:true};
        onComponentChanged?.(); setWiringFrom(null); return;
      }
    }
    if (wf.type==='pin') {
      const wire = circuit.addWire({compId:wf.compId,pin:wf.pin,type:'out'},{compId:comp.id,pin:idx,type:'in'});
      if (wire) wire.points = routeManhattanPoints(terminalCoords(wire.from,circuit),terminalCoords(wire.to,circuit),wf.dir||'h');
      wiringFromRef.current=null;
      onComponentChanged?.(); setWiringFrom(null);
    }
  };
  const onOutputPinUp=(e,comp,idx)=>{
    e.stopPropagation();
    const wf = wiringFromRef.current;
    if (!wf) return;
      if (wf.type==='endpoint' && wf.side==='from') {
        const wire=circuit.wires.get(wf.wireId);
        if (wire) {
          wire.from={compId:comp.id,pin:idx,type:'out'};
          wire.points = routeManhattanPoints(terminalCoords(wire.from,circuit), terminalCoords(wire.to,circuit), wf.dir||'h');
          endpointDragRef.current=null;
          wiringFromRef.current={...wf, handled:true};
          onComponentChanged?.(); setWiringFrom(null); return;
        }
      }
  };
  const onWireEdgeDown=(e,wire)=>{
    if (e.button!==0) return;
    e.stopPropagation();
    const w=screenToWorld(e.clientX,e.clientY);
    const nearest=findNearestWirePoint(wire,w.x,w.y,circuit);
    const wf={type:'branch',wireId:wire.id,x:nearest.point.x,y:nearest.point.y,startX:w.x,startY:w.y,startSX:e.clientX,startSY:e.clientY};
    wiringFromRef.current=wf;
    setWiringFrom(wf);
  };
  const onWireEndpointMouseDown=(e,wire,side,pt)=>{
    if (e.button!==0) return;
    e.stopPropagation();
    const w=screenToWorld(e.clientX,e.clientY);
    endpointDragRef.current={wireId:wire.id,side,ox:pt.x-w.x,oy:pt.y-w.y};
    const wf={type:'endpoint',wireId:wire.id,side,x:pt.x,y:pt.y,startX:pt.x,startY:pt.y};
    wiringFromRef.current=wf;
    setWiringFrom(wf);
  };
  const onWireClick=(e,wire)=>{
    // Only add waypoint if we're not coming from a pan
    if(isPanning) return;
    e.stopPropagation();
    const w=screenToWorld(e.clientX,e.clientY);
    const a=terminalCoords(wire.from,circuit),b=terminalCoords(wire.to,circuit);
    insertBranchPoint(wire,snap(w.x,snapGrid),snap(w.y,snapGrid));
    onComponentChanged?.();
  };
  const onWaypointMouseDown=(e,wire,idx,pt)=>{
    e.stopPropagation();
    const w=screenToWorld(e.clientX,e.clientY);
    wpDragRef.current={wireId:wire.id,idx,ox:pt.x-w.x,oy:pt.y-w.y};
  };
  const onWaypointContext=(e,wire,idx)=>{
    e.preventDefault(); e.stopPropagation();
    wire.points.splice(idx,1); onComponentChanged?.();
  };

  const components=[...circuit.components.values()];
  const wires=[...circuit.wires.values()];
  const tx=view.x*view.zoom, ty=view.y*view.zoom;

  // Clock overlay
  const selComp = selectedId ? circuit.components.get(selectedId) : null;
  const clockPanel = selComp?.kind==='CLOCK' ? (()=>{
    const vis=GATE_VIS.CLOCK;
    const sx=(selComp.x+vis.w/2+view.x)*view.zoom;
    const sy=(selComp.y+vis.h+10+view.y)*view.zoom;
    return (
      <div className="clk-panel" style={{left:sx,top:sy}}
           onMouseDown={e=>e.stopPropagation()}>
        <div className="clk-header">
          <span className="clk-label">Clock</span>
          <span className="clk-status">{selComp.state.paused?'paused':`${selComp.state.period}ms`}</span>
        </div>
        <div className="clk-period">
          <span style={{fontSize:10.5,color:'var(--ink-3)',fontFamily:'var(--mono)'}}>100</span>
          <input type="range" min="100" max="4000" step="100"
                 value={selComp.state.period}
                 onChange={e=>{circuit.setClockPeriod(selComp.id,Number(e.target.value));onComponentChanged?.();}}/>
          <span className="clk-period-val">{selComp.state.period}ms</span>
        </div>
      </div>
    );
  })() : null;
  const ioPanel = selComp?.kind==='INPUT' || selComp?.kind==='OUTPUT' ? (()=>{
    return (
      <div className="prop-panel" onMouseDown={e=>e.stopPropagation()}>
        <div className="prop-title">{selComp.kind} Properties</div>
        <div className="prop-option">
          <span className="prop-label">Label</span>
          <input  className="prop-input" 
                  value={selComp.label}
                  onChange={e=>{circuit.setIOLabel(selComp.id,e.target.value);onComponentChanged?.();}}/>  
        </div>
        <div className="prop-option">
          <span className="prop-label">Facing</span>
          <select className="prop-input" 
                  value={selComp.facing}
                  onChange={e=>{circuit.setFacing(selComp.id,e.target.value);onComponentChanged?.();}}>
            <option value="right">Right</option>
            <option value="left">Left</option>
            <option value="up">Up</option>
            <option value="down">Down</option>
          </select>
        </div>
      </div>
    )
  })() : null;
  const gatePanel = ['AND','OR','NAND','NOR','XOR','XNOR','MUX'].includes(selComp?.kind) ? (()=>{
    return (
      <div className="prop-panel" onMouseDown={e=>e.stopPropagation()}>
        <div className="prop-title">{selComp.kind} Properties</div>
        <div className="prop-option">
          <span className="prop-label">Facing</span>
          <select className="prop-input" 
                  value={selComp.facing}
                  onChange={e=>{circuit.setFacing(selComp.id,e.target.value);onComponentChanged?.();}}>
            <option value="right">Right</option>
            <option value="left">Left</option>
            <option value="up">Up</option>
            <option value="down">Down</option>
          </select>
        </div>
      </div>
    )
  })() : null;

  return <>
    <svg ref={svgRef} className="canvas"
         style={{width:'100%',height:'100%',cursor:isPanning?'grabbing':'default',background:'transparent'}}
         onMouseDown={onMouseDownBg}
         onWheel={onWheel}
         onContextMenu={e=>e.preventDefault()}>
      <defs>
        <pattern id="grid-dots" x="0" y="0" width={GRID} height={GRID} patternUnits="userSpaceOnUse">
          <circle cx={GRID/2} cy={GRID/2} r="1" fill="var(--grid)"/>
        </pattern>
      </defs>
      <rect className="canvas-bg" x="-5000" y="-5000" width="10000" height="10000"
            fill="url(#grid-dots)"
            transform={`translate(${tx},${ty}) scale(${view.zoom})`}/>

      <g transform={`translate(${tx},${ty}) scale(${view.zoom})`}>
        {/* Wires */}
        {wires.map(w=>{
          const a=terminalCoords(w.from,circuit), b=terminalCoords(w.to,circuit);
          const pts=w.points||[];
          const path=wirePath(a.x,a.y,b.x,b.y,pts);
          const high=w.value===1;
          return <g key={w.id}>
            {/* Shadow */}
            <path d={path} fill="none" stroke="var(--ink)" strokeWidth="3.5"
                  strokeLinejoin="round" strokeLinecap="round" opacity="0.07"/>
            {/* Signal color */}
            <path d={path} fill="none"
                  stroke={high?'var(--high)':'var(--low)'}
                  strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"
                  style={{transition:'stroke 100ms ease'}}/>
            {/* Fat hit target — click to add branch */}
            <path d={path} fill="none" stroke="transparent" strokeWidth="16"
                  style={{cursor:'cell'}}
                  onMouseDown={e=>onWireEdgeDown(e,w)}
                  onContextMenu={e=>onWireContext(e,w.id)}/>
            {/* Particles on HIGH */}
            {high&&<ParticleStream a={a} b={b} pts={pts}/>}
            {/* In-flight pulse */}
            {typeof w.pendingValue!=='undefined'&&(()=>{
              const knots = wireSegmentPoints(w, circuit);
              let wireLen = 0;
              for (let i = 0; i < knots.length - 1; i++) {
                wireLen += Math.hypot(knots[i+1].x - knots[i].x, knots[i+1].y - knots[i].y);
              }
              const REF_LEN = 80;
              const wireDelay = (wireLen / REF_LEN) * (window.__widgetState.delayMs);
              return <InflightPulse a={a} b={b} pts={pts} pendingValue={w.pendingValue}
                                    pendingStart={w.pendingStart} delayMs={wireDelay}/>;
            })()}
            {/* Free endpoint handles */}
            {!w.from.compId&&<circle cx={a.x} cy={a.y} r="6" fill="white" stroke="var(--border-md)" strokeWidth="1.5"
                      style={{cursor:'move'}}
                      onMouseDown={e=>onWireEndpointMouseDown(e,w,'from',a)}/>}            
            {!w.to.compId&&<circle cx={b.x} cy={b.y} r="6" fill="white" stroke="var(--border-md)" strokeWidth="1.5"
                      style={{cursor:'move'}}
                      onMouseDown={e=>onWireEndpointMouseDown(e,w,'to',b)}/>}            
            {/* Waypoint handles */}
            {pts.map((pt,idx)=>(
              <circle key={'wp'+idx} cx={pt.x} cy={pt.y} r="5"
                      fill="var(--bg)" stroke="var(--border-md)" strokeWidth="1.5"
                      style={{cursor:'move'}}
                      onMouseDown={e=>onWaypointMouseDown(e,w,idx,pt)}
                      onContextMenu={e=>onWaypointContext(e,w,idx)}/>
            ))}
          </g>;
        })}

        {/* Components */}
        {components.map(comp=>{
          const vis=GATE_VIS[comp.kind],isSel=selectedId===comp.id;
          return <g key={comp.id} transform={`translate(${comp.x},${comp.y})`}
                    onMouseDown={e=>onCompMouseDown(e,comp)}
                    onContextMenu={e=>onCompContext(e,comp)}
                    style={{cursor:'move'}}>
            {isSel&&<rect x="-6" y="-6" width={vis.w+12} height={vis.h+12} rx="10"
                          fill="none" stroke="var(--ink)" strokeWidth="1.5"
                          strokeDasharray="4 3" opacity="0.35"
                          transform={comp.facing==='left'
                          ? `translate(${vis.w} 0) scale(-1 1)`
                          : `rotate(${comp.facing==='up'?270:comp.facing==='down'?90:0} ${vis.w/2} ${vis.h/2})`}/>}
            <GateBody comp={comp}/>
            {vis.inputs.map((_,i)=>{
              const abs=pinAbs(comp,'in',i);
              return <circle key={'in'+i} cx={abs.x-comp.x} cy={abs.y-comp.y} r="6"
                      fill={comp.inputVals[i]?'var(--high)':'var(--bg)'}
                      stroke="var(--border-md)" strokeWidth="1.5"
                      style={{cursor:'crosshair'}}
                      onMouseUp={e=>onInputPinUp(e,comp,i)}
                      onMouseDown={e=>e.stopPropagation()}/>
            })}
            {vis.outputs.map((_,i)=>{
              const abs=pinAbs(comp,'out',i);
              return <circle key={'out'+i} cx={abs.x-comp.x} cy={abs.y-comp.y} r="6"
                      fill={comp.outputVals[i]?'var(--high)':'var(--bg)'}
                      stroke="var(--border-md)" strokeWidth="1.5"
                      style={{cursor:'crosshair'}}
                      onMouseDown={e=>onOutputPinDown(e,comp,i)}
                      onMouseUp={e=>onOutputPinUp(e,comp,i)}/>
            })}
          </g>;
        })}

        {/* Wiring preview */}
        {wiringFrom&&
          <path d={wirePath(wiringFrom.x,wiringFrom.y,mousePos.x,mousePos.y)}
                fill="none" stroke="var(--high)" strokeWidth="2"
                strokeDasharray="6 4" opacity="0.7"/>}

        {/* Palette drag ghost */}
        {paletteDrag&&(()=>{
          const vis=GATE_VIS[paletteDrag.kind];
          return <g transform={`translate(${snap(mousePos.x-vis.w/2,snapGrid)},${snap(mousePos.y-vis.h/2,snapGrid)})`}
                    opacity="0.6" pointerEvents="none">
            <GateBody comp={{kind:paletteDrag.kind,inputVals:new Array(GATE_DEFS[paletteDrag.kind].inputs).fill(0),outputVals:new Array(GATE_DEFS[paletteDrag.kind].outputs).fill(0),state:{value:0}}}/>
          </g>;
        })()}
      </g>
    </svg>
    {clockPanel}
    {ioPanel}
    {gatePanel}
  </>;
}

function ParticleStream({a,b,pts=[]}) {
  const [t,setT]=useState(0);
  useEffect(()=>{let r,l=performance.now();const fn=(now)=>{setT(p=>(p+(now-l)*.0006)%1);l=now;r=requestAnimationFrame(fn);};r=requestAnimationFrame(fn);return()=>cancelAnimationFrame(r);},[]);
  const N=window.__widgetState.particleDensity??4; if(N===0)return null;
  return <g pointerEvents="none">{Array.from({length:N},(_,i)=>{
    const tt=(t+i/N)%1,[x,y]=sampleWire(a.x,a.y,b.x,b.y,pts,tt);
    return <circle key={i} cx={x} cy={y} r="2.4" fill="var(--high)" opacity=".8"/>;
  })}</g>;
}
function InflightPulse({a,b,pts=[],pendingValue,pendingStart,delayMs}) {
  const [now,setNow]=useState(performance.now());
  useEffect(()=>{let r;const l=()=>{setNow(performance.now());r=requestAnimationFrame(l);};r=requestAnimationFrame(l);return()=>cancelAnimationFrame(r);},[]);
  const t=Math.min(1,(now-(pendingStart||now))/delayMs);
  const[x,y]=sampleWire(a.x,a.y,b.x,b.y,pts,t);
  const col=pendingValue===1?'var(--high)':'var(--low-p)';
  return <g pointerEvents="none"><circle cx={x} cy={y} r="7" fill={col} opacity=".22"/><circle cx={x} cy={y} r="3.5" fill={col}/></g>;
}

window.Canvas=Canvas;
})();


/* ═══ PALETTE ══════════════════════════════════════════════════════════════ */
(function(){
'use strict';
const{GATE_VIS,GATE_DEFS,GateBody}=window;
const GROUPS=[
  {title:'Sources',   kinds:['INPUT','CLOCK']},
  {title:'Sinks',     kinds:['OUTPUT']},
  {title:'Logic',     kinds:['AND','OR','NOT','NAND','NOR','XOR','XNOR','MUX']},
  {title:'Flip-flops',kinds:['DFF','TFF','JKFF','SRFF']},
];
function Thumb({kind}){
  const vis=GATE_VIS[kind],def=GATE_DEFS[kind];
  const tw=62,th=44,sc=Math.min(tw/(vis.w+24),th/(vis.h+8));
  const tx2=(tw-(vis.w+12)*sc)/2,ty2=(th-vis.h*sc)/2;
  return <svg width={tw} height={th}><g transform={`translate(${tx2},${ty2}) scale(${sc})`}><GateBody comp={{kind,inputVals:new Array(def.inputs).fill(0),outputVals:new Array(def.outputs).fill(0),state:{value:0}}}/></g></svg>;
}
function Palette({onDragStart}){
  return <div className="palette">{GROUPS.map(g=><div className="pal-group" key={g.title}>
    <div className="pal-group-title">{g.title}</div>
    <div className="pal-grid">{g.kinds.map(k=><button key={k} className="pal-item"
      onMouseDown={e=>{e.preventDefault();onDragStart(k);}}>
      <Thumb kind={k}/><div className="pal-label">{GATE_DEFS[k].label}</div>
    </button>)}</div>
  </div>)}</div>;
}
window.Palette=Palette;
})();


/* ═══ APP ══════════════════════════════════════════════════════════════════ */
(function(){
'use strict';
const{useState,useEffect,useCallback}=React;
const{Canvas,Palette,createCircuit,GATE_DEFS}=window;

function App(){
  const[circuit]=useState(()=>createCircuit());
  window.__widgetState.circuit = circuit;
  const[,tick]=useState(0);
  const refresh=useCallback(()=>tick(n=>n+1),[]);
  const[selectedId,setSelectedId]=useState(null);
  const[palDrag,setPalDrag]=useState(null);
  const[delayMs,setDelayMs]=useState(600);
  const[saved,setSaved]=useState(()=>{try{return JSON.parse(localStorage.getItem('dss_v2')||'[]');}catch{return[];}});
  const[showSave,setShowSave]=useState(false);
  const[saveName,setSaveName]=useState('');
  const[showLoad,setShowLoad]=useState(false);
  const[showEquation, setShowEquation]=useState(false);
  const[equation,setEquation]=useState('');
  const[equationToLoad,setEquationToLoad]=useState('');


  window.__widgetState.delayMs=delayMs;
  window.__widgetState.particleDensity=4;

  // Sim loop
  useEffect(()=>{
    let r;const l=()=>{circuit.step(performance.now(),delayMs);r=requestAnimationFrame(l);};
    r=requestAnimationFrame(l);return()=>cancelAnimationFrame(r);
  },[delayMs]);

  // Beamer+ state persistence protocol
  useEffect(()=>{
    const cfg = window.WIDGET_CONFIG || {};
    const wid = cfg.id || 'circuit-sim';
    const handler=(e)=>{
      if(!e.data) return;
      if(e.data.type==='widget-get-state'){
        window.parent.postMessage({type:'widget-state',widgetId:wid,state:circuit.serialize()},'*');
      } else if(e.data.type==='widget-set-state' && e.data.state){
        circuit.load(e.data.state);refresh();
      }
    };
    window.addEventListener('message',handler);
    return()=>window.removeEventListener('message',handler);
  },[]);

  // Keyboard delete
  useEffect(()=>{
    const fn=(e)=>{
      if((e.key==='Delete'||e.key==='Backspace')&&selectedId){
        if(e.target.tagName==='INPUT')return;
        circuit.removeComponent(selectedId);setSelectedId(null);refresh();
      }
    };
    window.addEventListener('keydown',fn);return()=>window.removeEventListener('keydown',fn);
  },[selectedId]);

  const doSave=()=>{
    const name=saveName.trim()||`Circuit ${saved.length+1}`;
    const next=[...saved.filter(s=>s.name!==name),{name,data:circuit.serialize(),ts:Date.now()}];
    setSaved(next);localStorage.setItem('dss_v2',JSON.stringify(next));setShowSave(false);setSaveName('');
  };
  const doLoad=(s)=>{circuit.load(s.data);setShowLoad(false);refresh();};
  const delSaved=(name)=>{const n=saved.filter(s=>s.name!==name);setSaved(n);localStorage.setItem('dss_v2',JSON.stringify(n));};
  const doClear=()=>{if(!confirm('Clear canvas?'))return;[...circuit.components.keys()].forEach(id=>circuit.removeComponent(id));refresh();};
  const generateEquation=()=>{

    const inputs = Array.from(circuit.ioComponents.values()).
      filter(c=>c.kind==='INPUT').
      sort((a,b)=>a.ioId.localeCompare(b.ioId));
    const outputs = Array.from(circuit.ioComponents.values()).
      filter(c=>c.kind==='OUTPUT').
      sort((a,b)=>a.ioId.localeCompare(b.ioId));

    if (inputs.length == 0) {
      alert('Your circuit has no inputs.');
      return;
    }

    let labels = new Set();
    for (let ioComp of inputs.concat(outputs)) {
      if (labels.has(ioComp.label)) {
        alert('Your circuit has duplicate labels.');
        break;
      } else { labels.add(ioComp.label); }
    }

    const outputMinterms = new Map(outputs.map(o=>[o, []]));
    const originalInputValues = inputs.map(inp=>inp.state.value);

    const combinations = 1 << inputs.length;
    for (let mask = 0; mask < combinations; mask++) {
      inputs.forEach((inp, idx)=>{ inp.state.value = (mask >> idx) & 1; });
      settleCircuit(circuit, 10);

      for (const output of outputs) {
        if (output.inputVals[0] === 1) {
          outputMinterms.get(output).push(mask);
        }
      }
    }

    inputs.forEach((inp, idx)=>{ inp.state.value = originalInputValues[idx]; });
    settleCircuit(circuit, 10);

    const equations = outputs.map(output=>{
      const terms = outputMinterms.get(output);
      const rhs = terms.length ? quineMcCluskey(terms, inputs.length, inputs.map((item) => (item.label.length === 1 ? item.label : `(${item.label})`))).expression : '0';
      return `${output.label} = ${rhs}`;
    });

    setEquation(equations.join('<br>'));
  };

  function settleCircuit(circuit, maxSteps = 10) {
    for (let i = 0; i < maxSteps; i++) {
      circuit.step(performance.now(), 0);
    }
  }

  const loadEquation=()=>{
    const eq = equationToLoad.trim();
    const match = /^([A-Za-z])\s*=\s*(.+)$/.exec(eq);
    if (!match) {
      alert('Enter an equation like A = B + C\'');
      return;
    }

    const outputLabel = match[1];
    const rhs = match[2];
    const literalLabels = [...new Set((rhs.match(/[A-Za-z]/g) || []))].filter(l => l !== outputLabel);

    circuit.components.clear(); circuit.ioComponents.clear(); circuit.wires.clear();

    const labelsToComps = new Map();
    literalLabels.forEach((label, idx) => {
      const comp = circuit.addComponent("INPUT", 0, idx * 60, label);
      labelsToComps.set(label, comp);
    });

    const outputComp = circuit.addComponent("OUTPUT", 400, 0, outputLabel);

    let numAnds = 0;
    let numNots = 0;

    const wireFrom = (comp, pin=0) => ({compId: comp.id, pin});
    const parseLiteral = (literal) => {
      const label = literal[0];
      const comp = labelsToComps.get(label);
      if (!comp) throw new Error(`Unknown input label ${label}`);
      if (literal.endsWith("'")) {
        const notComp = circuit.addComponent("NOT", 100, numNots * 70);
        numNots++;
        circuit.addWire(wireFrom(comp), wireFrom(notComp));
        return wireFrom(notComp);
      }
      return wireFrom(comp);
    };

    const createAndTerm = (term) => {
      const literals = term.match(/[A-Za-z]'?/g) || [];
      if (literals.length === 0) return null;
      let current = parseLiteral(literals[0]);
      for (let i = 1; i < literals.length; i++) {
        const next = parseLiteral(literals[i]);
        const andComp = circuit.addComponent("AND", 200, numAnds * 70);
        numAnds++;
        circuit.addWire(current, {compId: andComp.id, pin: 0});
        circuit.addWire(next, {compId: andComp.id, pin: 1});
        current = {compId: andComp.id, pin: 0};
      }
      return current;
    };

    const orTerms = rhs.split('+').map(t => t.trim()).filter(Boolean);
    if (orTerms.length === 0) {
      alert('No terms found in the equation');
      return;
    }

    let outputSource = createAndTerm(orTerms[0]);
    for (let i = 1; i < orTerms.length; i++) {
      const nextTerm = createAndTerm(orTerms[i]);
      const orComp = circuit.addComponent("OR", 300, i * 70);
      circuit.addWire(outputSource, {compId: orComp.id, pin: 0});
      circuit.addWire(nextTerm, {compId: orComp.id, pin: 1});
      outputSource = {compId: orComp.id, pin: 0};
    }

    circuit.addWire(outputSource, {compId: outputComp.id, pin: 0});
    setShowLoad(false);
  }

  const n=circuit.components.size;

  return <div className="app">
    <div className="tb">
      <span className="tb-title">Circuit Simulator</span>
      {/* Save / Load / Clear */}
      <div className="tb-sep"/>
      <button className="btn ghost" style={{height:26,fontSize:12}} onClick={()=>setShowSave(true)} disabled={n===0}>Save</button>
      <button className="btn ghost" style={{height:26,fontSize:12}} onClick={()=>setShowLoad(true)}>Load</button>
      <button className="btn ghost" style={{height:26,fontSize:12,color:'var(--ink-3)'}} onClick={doClear} disabled={n===0}>Clear</button>
      <button className="btn ghost" style={{height:26,fontSize:12}} onClick={()=>setShowEquation(true)}>Boolean Equation</button>
      {/* Propagation delay */}
      <div className="tb-delay">
        <span>Delay</span>
        <input type="range" min="10" max="2000" step="10" value={delayMs}
               onChange={e=>setDelayMs(Number(e.target.value))}/>
        <span className="tb-delay-val">{delayMs}ms</span>
      </div>
    </div>

    <div className="main">
      <Palette onDragStart={kind=>setPalDrag({kind})}/>
      <div className="canvas-wrap">
        <Canvas circuit={circuit}
                selectedId={selectedId}
                onSelect={setSelectedId}
                paletteDrag={palDrag}
                onClearPaletteDrag={()=>setPalDrag(null)}
                onComponentChanged={refresh}
                snapGrid={true}/>
        <div className="fc">
          <span className="fc-n">{n}</span><span className="fc-lbl">gates</span>
          <span className="fc-div"/>
          <span className="fc-n">{circuit.wires.size}</span><span className="fc-lbl">wires</span>
        </div>
      </div>
    </div>

    {showSave&&<Dialog title="Save circuit" onClose={()=>setShowSave(false)}>
      <input className="text-input" placeholder="My circuit" value={saveName} autoFocus
             onChange={e=>setSaveName(e.target.value)}
             onKeyDown={e=>e.key==='Enter'&&doSave()}/>
      <div className="dialog-actions">
        <button className="btn ghost" onClick={()=>setShowSave(false)}>Cancel</button>
        <button className="btn primary" onClick={doSave}>Save</button>
      </div>
    </Dialog>}

    {showLoad&&<Dialog title="Saved circuits" onClose={()=>setShowLoad(false)}>
      {saved.length===0
        ? <div className="empty">No saved circuits yet.</div>
        : <div className="saved-list">{saved.map(s=><div key={s.name} className="saved-item">
            <div>
              <div className="saved-name">{s.name}</div>
              <div className="saved-meta">{s.data.components.length} gates · {s.data.wires.length} wires</div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button className="btn ghost danger" onClick={()=>delSaved(s.name)}>Delete</button>
              <button className="btn primary" onClick={()=>doLoad(s)}>Load</button>
            </div>
          </div>)}</div>}
      <br/>
      <div className="modal-title">Load from Equation</div>
      <input className="text-input" placeholder="A = B" value={equationToLoad} autoFocus
             onChange={e=>setEquationToLoad(e.target.value)}
             onKeyDown={e=>e.key==='Enter'&&loadEquation()}/>
      <div className="dialog-actions">
        <button className="btn ghost" onClick={()=>setShowLoad(false)}>Cancel</button>
        <button className="btn primary" onClick={loadEquation}>Load</button>
      </div>
    </Dialog>}

    {showEquation&&<Dialog title="Generate Boolean Equation" onClose={()=>setShowEquation(false)}>
      <p>{equation === '' ? "No equation generated." : equation}</p>
      <div className="dialog-actions">
        <button className="btn ghost" onClick={()=>generateEquation()}>{equation === '' ? "Generate" : "Regenerate"}</button>
        <button className="btn ghost" onClick={()=>setShowEquation(false)}>Exit</button>
      </div>
    </Dialog>}

  </div>;
}

function Dialog({title,children,onClose}){
  return <div className="modal-bg" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-title">{title}</div>
      {children}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
})();
</script>
</body>
</html>
